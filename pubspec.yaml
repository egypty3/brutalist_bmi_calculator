name: brutalist_bmi_calculator
description: A neo-brutalist BMI calculator app.
publish_to: 'none'
version: 1.1.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  google_mobile_ads:
    path: third_party/google_mobile_ads
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

dependency_overrides:
  google_mobile_ads:
    path: third_party/google_mobile_ads
  shared_preferences_android:
    path: third_party/shared_preferences_android-2.4.11
  webview_flutter_android:
    path: third_party/webview_flutter_android-4.12.0

